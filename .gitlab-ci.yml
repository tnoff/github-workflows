include:
  - local: '/gitlab/tag.yml'
  - local: '/gitlab/discord-notify.yml'
  - local: '/gitlab/renovate.yml'
  - local: '/gitlab/trufflehog.yml'

stages:
  - pr-check
  - test
  - push
  - notify
  - renovate

"pr-check:pre-commit":
  stage: pr-check
  # Pre-baked ci-pre-commit image (python + git + pre-commit); see the
  # CI_PRE_COMMIT_IMAGE group var. before_script install is an idempotent
  # fallback so this still works on a plain python image.
  image: $CI_PRE_COMMIT_IMAGE
  tags:
    - self-hosted
  before_script:
    - |
      if ! command -v git >/dev/null 2>&1 || ! command -v pre-commit >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y -qq git
        pip install pre-commit
      fi
  script:
    - pre-commit run --all-files
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

"pr-check:secrets":
  extends: .trufflehog
  stage: pr-check
  tags:
    - self-hosted
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

"push:tag":
  extends: .tag
  stage: push
  tags:
    - self-hosted
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

"notify:mr-opened":
  extends: .discord-notify
  stage: notify
  needs: []
  tags:
    - self-hosted
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

"notify:tag-failure":
  extends: .discord-notify
  stage: notify
  needs: ["push:tag"]
  tags:
    - self-hosted
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

"notify:merged":
  extends: .discord-notify
  stage: notify
  needs: []
  tags:
    - self-hosted
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
