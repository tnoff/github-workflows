stages:
  - validate

pre-commit:
  stage: validate
  image: python:3.14-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install pre-commit
  script:
    - pre-commit run --all-files
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
