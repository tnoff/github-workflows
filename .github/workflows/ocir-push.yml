name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Name of the Docker image'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      docker_context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Platforms to build for (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      version_file:
        description: 'Path to VERSION file'
        required: false
        type: string
        default: './VERSION'
      runner_labels:
        description: 'Runner labels as JSON array (e.g., ["self-hosted", "oke"])'
        required: false
        type: string
        default: '["ubuntu-24.04"]'
      tag_version:
        description: 'Tag image with version from VERSION file and latest (default: only commit SHA)'
        required: false
        type: boolean
        default: false
      allow_fork_prs:
        description: 'Allow fork PRs to run this workflow (set false for self-hosted runners)'
        required: false
        type: boolean
        default: true
    secrets:
      oci_registry:
        description: 'OCI Registry URL (e.g., iad.ocir.io)'
        required: true
      oci_username:
        description: 'OCI Username'
        required: true
      oci_token:
        description: 'OCI Auth Token'
        required: true
      oci_namespace:
        description: 'OCIR Namespace'
        required: true
    outputs:
      version:
        description: 'Version read from VERSION file'
        value: ${{ jobs.build-and-push.outputs.version }}
      image_tags:
        description: 'Full image tags that were built'
        value: ${{ jobs.build-and-push.outputs.image_tags }}

jobs:
  build-and-push:
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    if: >-
      inputs.allow_fork_prs ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tags: ${{ steps.extract-tags.outputs.tag_names }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read VERSION file
        id: version
        run: |
          if [ -f "${{ inputs.version_file }}" ]; then
            VERSION=$(cat ${{ inputs.version_file }} | tr -d '[:space:]')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "📦 Version from file: ${VERSION}"
          else
            echo "⚠️  VERSION file not found at ${{ inputs.version_file }}, using commit SHA only"
            echo "version=unset" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to OCI Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ secrets.oci_registry }}
          username: ${{ secrets.oci_username }}
          password: ${{ secrets.oci_token }}

      - name: Check if version tag is enabled
        id: version-tag
        run: |
          if [ "${{ inputs.tag_version }}" = "true" ] && \
             [ "${{ steps.version.outputs.version }}" != "unset" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ secrets.oci_registry }}/${{ secrets.oci_namespace }}/${{ inputs.image_name }}
          tags: |
            # Always add commit SHA (short)
            type=sha,prefix=,format=short
            # Use VERSION file for version tag (only when tag_version is true)
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version-tag.outputs.enabled }}
            # Add 'latest' (only when tag_version is true)
            type=raw,value=latest,enable=${{ inputs.tag_version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract tag names
        id: extract-tags
        run: |
          # Extract just the tag names (part after the last colon) from full image paths
          TAG_NAMES=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/.*://g' | tr '\n' ',')
          echo "tag_names=${TAG_NAMES%,}" >> $GITHUB_OUTPUT
          echo "Extracted tag names: ${TAG_NAMES%,}"

      - name: Image summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Name:** \`${{ inputs.image_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
