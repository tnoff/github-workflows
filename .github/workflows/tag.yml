name: Tag commit on version file

on:
  workflow_call:
    inputs:
      version_file:
        description: 'Path to version file'
        required: false
        type: string
        default: './VERSION'
      version_file_type:
        description: 'File type: plain (raw text) or json'
        required: false
        type: string
        default: 'plain'
      version_json_key:
        description: 'Key to extract when version_file_type is json (e.g. "version" for package.json)'
        required: false
        type: string
        default: 'version'
      runner_labels:
        description: 'Runner labels as JSON array (e.g., ["self-hosted", "oke"])'
        required: false
        type: string
        default: '["ubuntu-24.04"]'
      allow_fork_prs:
        description: 'Allow fork PRs to run this workflow (set false for self-hosted runners)'
        required: false
        type: boolean
        default: true
    outputs:
      version:
        description: 'Version read from version file (with v prefix)'
        value: ${{ jobs.tag_build.outputs.version }}
      tag_created:
        description: 'Whether a new tag was created (true/false)'
        value: ${{ jobs.tag_build.outputs.tag_created }}
      tag_exists:
        description: 'Whether the tag already existed (true/false)'
        value: ${{ jobs.tag_build.outputs.tag_exists }}

jobs:
  tag_build:
    name: Tag Build if doesn't exist already
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    if: >-
      inputs.allow_fork_prs ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.check-tag.outputs.exists != 'true' }}
      tag_exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Get version
        id: version
        run: |
          if [ "${{ inputs.version_file_type }}" = "json" ]; then
            echo "version=v$(jq -r '.${{ inputs.version_json_key }}' '${{ inputs.version_file }}')" >> $GITHUB_OUTPUT
          else
            echo "version=v$(cat '${{ inputs.version_file }}')" >> $GITHUB_OUTPUT
          fi
      - name: Check If Tag already exists
        uses: mukunku/tag-exists-action@bdad1eaa119ce71b150b952c97351c75025c06a9
        id: check-tag
        with:
          tag: ${{ steps.version.outputs.version }}
      - run: echo "Tag exists!"
        if: steps.check-tag.outputs.exists == 'true'
      - name: Add tag
        id: tag-version
        if: steps.check-tag.outputs.exists != 'true'
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.version.outputs.version }}
          tag_prefix: ''

      - name: Summary
        run: |
          echo "## 🏷️ Git Tag Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-tag.outputs.exists }}" = "true" ]; then
            echo "ℹ️ Tag already exists - no new tag created" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ New tag created successfully" >> $GITHUB_STEP_SUMMARY
          fi
