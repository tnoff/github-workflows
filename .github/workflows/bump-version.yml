name: Bump version file on PR

on:
  workflow_call:
    inputs:
      paths:
        description: >-
          JSON array of glob patterns; at least one must match a changed file to
          trigger a bump (e.g., ["src/**", "package.json"]).
          Empty array (default) means always run.
        required: false
        type: string
        default: '[]'
      bump_type:
        description: 'Semver level to bump: major, minor, or patch'
        required: false
        type: string
        default: 'patch'
      version_file:
        description: 'Path to version file'
        required: false
        type: string
        default: './VERSION'
      version_file_type:
        description: 'File type: plain (raw text) or json'
        required: false
        type: string
        default: 'plain'
      version_json_key:
        description: 'Key to extract when version_file_type is json (e.g. "version" for package.json)'
        required: false
        type: string
        default: 'version'
      runner_labels:
        description: 'Runner labels as JSON array (e.g., ["self-hosted", "oke"])'
        required: false
        type: string
        default: '["ubuntu-24.04"]'
      allow_fork_prs:
        description: 'Allow fork PRs to run this workflow (set false for self-hosted runners)'
        required: false
        type: boolean
        default: false
    outputs:
      old_version:
        description: 'Version read from version file before bump'
        value: ${{ jobs.bump.outputs.old_version }}
      new_version:
        description: 'Version after bump (same as old_version if skipped)'
        value: ${{ jobs.bump.outputs.new_version }}
      version_bumped:
        description: 'Whether a bump commit was pushed to the PR branch (true/false)'
        value: ${{ jobs.bump.outputs.version_bumped }}

jobs:
  check:
    name: Check path filters
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Evaluate path filter
        id: filter
        env:
          PATHS_JSON: ${{ inputs.paths }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$PATHS_JSON" = "[]" ] || [ -z "$PATHS_JSON" ]; then
            echo "No path filter configured, will run"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$BASE_REF" ]; then
            echo "Not a PR event, skipping path filter check, will run"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          SHOULD_RUN=false
          while IFS= read -r pattern; do
            while IFS= read -r file; do
              case "$file" in
                $pattern)
                  echo "Matched: $file (pattern: $pattern)"
                  SHOULD_RUN=true
                  break 2
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          done < <(echo "$PATHS_JSON" | jq -r '.[]')
          if [ "$SHOULD_RUN" = "false" ]; then
            echo "No changed files matched the path filter, skipping bump"
          fi
          echo "should_run=${SHOULD_RUN}" >> $GITHUB_OUTPUT

  bump:
    name: Bump version in PR
    needs: check
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    if: >-
      needs.check.outputs.should_run == 'true' &&
      (inputs.allow_fork_prs ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: write
    outputs:
      old_version: ${{ steps.final.outputs.old_version }}
      new_version: ${{ steps.final.outputs.new_version }}
      version_bumped: ${{ steps.final.outputs.version_bumped }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Read current version
        id: read
        run: |
          if [ "${{ inputs.version_file_type }}" = "json" ]; then
            VERSION=$(jq -r '.${{ inputs.version_json_key }}' '${{ inputs.version_file }}')
          else
            VERSION=$(cat '${{ inputs.version_file }}')
          fi
          # Strip any trailing whitespace/newlines
          VERSION=$(echo "${VERSION}" | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if version already bumped in PR
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
          VERSION_FILE: ${{ inputs.version_file }}
          CURRENT_VERSION: ${{ steps.read.outputs.version }}
        run: |
          BASE_VERSION=$(git show "origin/${BASE_REF}:${VERSION_FILE}" 2>/dev/null | tr -d '[:space:]' || echo "")
          echo "Base branch version: ${BASE_VERSION}"
          echo "PR head version:     ${CURRENT_VERSION}"
          if [ -n "${BASE_VERSION}" ] && [ "${BASE_VERSION}" != "${CURRENT_VERSION}" ]; then
            echo "already_bumped=true" >> $GITHUB_OUTPUT
            echo "Version already changed in this PR, skipping bump"
          else
            echo "already_bumped=false" >> $GITHUB_OUTPUT
            echo "Version unchanged from base, will bump"
          fi

      - name: Calculate new version
        id: calc
        if: steps.check.outputs.already_bumped == 'false'
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
          OLD_VERSION: ${{ steps.read.outputs.version }}
        run: |
          MAJOR=$(echo "${OLD_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${OLD_VERSION}" | cut -d. -f2)
          PATCH=$(echo "${OLD_VERSION}" | cut -d. -f3)
          case "${BUMP_TYPE}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
            *)
              echo "Unknown bump_type '${BUMP_TYPE}'. Must be major, minor, or patch."
              exit 1
              ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumping ${BUMP_TYPE}: ${OLD_VERSION} -> ${NEW_VERSION}"

      - name: Write new version
        if: steps.check.outputs.already_bumped == 'false'
        env:
          NEW_VERSION: ${{ steps.calc.outputs.new_version }}
        run: |
          if [ "${{ inputs.version_file_type }}" = "json" ]; then
            jq --arg key '${{ inputs.version_json_key }}' --arg val "${NEW_VERSION}" \
              '.[$key] = $val' '${{ inputs.version_file }}' > /tmp/_version_tmp \
              && mv /tmp/_version_tmp '${{ inputs.version_file }}'
          else
            echo "${NEW_VERSION}" > '${{ inputs.version_file }}'
          fi

      - name: Commit and push bump
        if: steps.check.outputs.already_bumped == 'false'
        env:
          NEW_VERSION: ${{ steps.calc.outputs.new_version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '${{ inputs.version_file }}'
          git commit -m "chore: bump ${BUMP_TYPE} version to ${NEW_VERSION}"
          git push origin "HEAD:${HEAD_REF}"

      - name: Set final outputs
        id: final
        env:
          OLD_VERSION: ${{ steps.read.outputs.version }}
          NEW_VERSION: ${{ steps.calc.outputs.new_version }}
          ALREADY_BUMPED: ${{ steps.check.outputs.already_bumped }}
        run: |
          echo "old_version=${OLD_VERSION}" >> $GITHUB_OUTPUT
          if [ "${ALREADY_BUMPED}" = "true" ]; then
            echo "new_version=${OLD_VERSION}" >> $GITHUB_OUTPUT
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          else
            echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "version_bumped=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        env:
          OLD_VERSION: ${{ steps.read.outputs.version }}
          NEW_VERSION: ${{ steps.calc.outputs.new_version }}
          ALREADY_BUMPED: ${{ steps.check.outputs.already_bumped }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** \`${{ inputs.version_file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump type:** \`${BUMP_TYPE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${ALREADY_BUMPED}" = "true" ]; then
            echo "**Skipped** - version already changed in this PR (\`${OLD_VERSION}\`)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Bumped** \`${OLD_VERSION}\` → \`${NEW_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          fi
