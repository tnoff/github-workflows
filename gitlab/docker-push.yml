# Reusable GitLab CI template for building and pushing a multi-arch Docker image.
#
# Builds for linux/arm64 by default and pushes two tags: the short commit SHA
# and `latest`. Requires Docker-in-Docker (dind) and an OCI-compatible registry.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/docker-push.yml'
#
#   docker-push:
#     extends: .docker-push
#     variables:
#       DOCKER_PLATFORM: 'linux/arm64'   # optional, default shown
#     rules:
#       - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
#         when: on_success
#
# Required CI variables (set under Settings → CI/CD → Variables, all base64-encoded
# and masked — the `_64` suffix lets short values clear GitLab's masking length
# requirement):
#   OCI_REGISTRY_64    Hostname of the OCI registry (e.g. registry.example.com)
#   OCI_NAMESPACE_64   Registry namespace / organisation
#   OCI_REPO_NAME_64   Repository name for the image
#   OCI_USERNAME_64    Registry login username
#   OCI_TOKEN_64       Registry login password / token

.docker-push:
  image: docker.io/library/docker:27
  services:
    - docker.io/library/docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_PLATFORM: "linux/arm64"
  before_script:
    - |
      OCI_USERNAME=$(printf '%s' "$OCI_USERNAME_64" | base64 -d)
      OCI_TOKEN=$(printf '%s' "$OCI_TOKEN_64" | base64 -d)
      OCI_REGISTRY=$(printf '%s' "$OCI_REGISTRY_64" | base64 -d)
      OCI_NAMESPACE=$(printf '%s' "$OCI_NAMESPACE_64" | base64 -d)
      OCI_REPO_NAME=$(printf '%s' "$OCI_REPO_NAME_64" | base64 -d)
    - docker login -u "$OCI_USERNAME" -p "$OCI_TOKEN" "$OCI_REGISTRY"
    - docker run --privileged --rm tonistiigi/binfmt --install all
  script:
    - IMAGE="$OCI_REGISTRY/$OCI_NAMESPACE/$OCI_REPO_NAME"
    - docker build --platform "$DOCKER_PLATFORM" -t "$IMAGE:$CI_COMMIT_SHORT_SHA" -t "$IMAGE:latest" .
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"
