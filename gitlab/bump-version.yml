# Reusable GitLab CI template for auto-bumping the patch version on a branch.
#
# Compares the version on the current branch against the default branch.
# If they match (no bump yet), increments the patch version, commits, and pushes
# back to the source branch. Exits cleanly if a *human* already bumped, preventing loops.
#
# Recompute-on-rebase: the bump commit is tagged with an "X-Auto-Bump: version"
# trailer. On re-run (e.g. after the base branch moved), the job peels its own
# prior bump commit and recomputes the version against the current base, then
# pushes with --force-with-lease. This keeps the version correct across rebases
# instead of stacking a stale bump that would conflict on merge.
#
# Supports plain-text version files (one line, e.g. "1.2.3") and JSON files
# (e.g. package.json with a "version" key). For JSON the file is rewritten with
# jq, preserving key order and using 2-space indentation.
#
# Authenticates the push using GITLAB_PUSH_TOKEN (GitLab PAT, project access
# token, or deploy token with write_repository scope) when set, otherwise falls
# back to CI_JOB_TOKEN with "CI job token" push access enabled under Settings →
# CI/CD → Token Access.
#
# Recommended: set GITLAB_PUSH_TOKEN. Pushes authored with CI_JOB_TOKEN do not
# trigger a follow-up pipeline (GitLab's infinite-loop guard), so the MR head
# advances past the latest pipeline's SHA and the MR widget reports
# "ci_must_pass" with no pipeline to show. A PAT-authored push triggers a fresh
# pipeline on the bump commit and keeps the MR widget green.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/bump-version.yml'
#
#   bump-version:
#     extends: .bump-version
#     variables:
#       VERSION_FILE: 'package.json'        # optional, default: VERSION
#       VERSION_FILE_TYPE: 'json'           # optional: 'plain' or 'json'
#       VERSION_JSON_KEY: 'version'         # optional, used when VERSION_FILE_TYPE=json
#     rules:
#       - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\//
#
# Optional variables:
#   VERSION_FILE        Path to the version file (default: VERSION)
#   VERSION_FILE_TYPE   'plain' or 'json' (default: plain)
#   VERSION_JSON_KEY    Key holding the version when VERSION_FILE_TYPE=json (default: version)
#   COMPARE_BRANCH      Branch to compare against (default: $CI_DEFAULT_BRANCH, falls back to "main")
#   BUMP_CHANGELOG      Set to "true" to also write a changelog *fragment* for this
#                       change under CHANGELOG_DIR (conflict-free — each MR drops a
#                       uniquely-named file rather than editing the shared changelog).
#                       Entry text is parsed from the MR title when it matches
#                       renovate's "<type>(deps): update dependency <name> to <version>"
#                       pattern; otherwise the MR title is used verbatim. Fragments are
#                       folded into CHANGELOG_FILE at release time by
#                       /gitlab/assemble-changelog.yml. (default: unset)
#   CHANGELOG_DIR       Directory holding unassembled changelog fragments
#                       (default: changelog.d). Only used when BUMP_CHANGELOG=true.
#   CHANGELOG_FILE      Path to the assembled changelog (default: CHANGELOG.md).

.bump-version:
  # Run in GitLab's built-in `.pre` stage so the bump happens before any
  # consumer-defined stages (validate, test, build, ...). When a bump is
  # needed, the resulting push triggers a fresh pipeline on the new SHA;
  # running first means the current pipeline doesn't burn time on stale
  # validation/tests before the bump fires.
  stage: .pre
  # Pre-baked CI utility image (git + curl + jq + bash) provisioned as the
  # CI_ALPINE_UTILS_IMAGE group variable in terraform/infra. The before_script
  # install is a no-op fallback so the template still works on a plain alpine:3
  # (or any runtime where the var resolves to a toolless base).
  image: $CI_ALPINE_UTILS_IMAGE
  variables:
    GIT_DEPTH: 0
    VERSION_FILE: "VERSION"
    VERSION_FILE_TYPE: "plain"
    VERSION_JSON_KEY: "version"
    COMPARE_BRANCH: ""
    BUMP_CHANGELOG: ""
    CHANGELOG_FILE: "CHANGELOG.md"
    CHANGELOG_DIR: "changelog.d"
  before_script:
    - command -v git >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || apk add --no-cache git jq
  script:
    - |
      BRANCH="${COMPARE_BRANCH:-${CI_DEFAULT_BRANCH:-main}}"
      SRC="$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
      git fetch origin "${BRANCH}" "${SRC}"

      # Read the version on the base branch and on this branch's current tip.
      if [ "$VERSION_FILE_TYPE" = "json" ]; then
        BASE_VERSION=$(git show "origin/${BRANCH}:${VERSION_FILE}" | jq -r ".$VERSION_JSON_KEY" | tr -d '[:space:]')
        CURRENT_VERSION=$(jq -r ".$VERSION_JSON_KEY" "${VERSION_FILE}" | tr -d '[:space:]')
      else
        BASE_VERSION=$(git show "origin/${BRANCH}:${VERSION_FILE}" | tr -d '[:space:]')
        CURRENT_VERSION=$(cat "${VERSION_FILE}" | tr -d '[:space:]')
      fi

      # The version we want this branch to carry: base patch + 1.
      MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
      MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
      PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
      NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))"

      # Is this branch's tip our own auto-bump commit (carries our trailer)?
      OURS=false
      if git log -1 --format='%B' | grep -qi '^X-Auto-Bump: version[[:space:]]*$'; then
        OURS=true
      fi

      # Steady state: the branch already carries the desired version — nothing to
      # do. This is also what breaks the push -> pipeline -> push loop: our own
      # bump commit re-triggers this job, which then sees CURRENT == NEW and exits.
      if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
        echo "Branch already at $NEW_VERSION (base $BASE_VERSION) — nothing to do."
        exit 0
      fi

      # A human bumped the version themselves (differs from base, not our commit):
      # respect it and leave the branch untouched.
      if [ "$CURRENT_VERSION" != "$BASE_VERSION" ] && [ "$OURS" != "true" ]; then
        echo "Manual bump ($BASE_VERSION -> $CURRENT_VERSION) — leaving as-is."
        exit 0
      fi

      # Recompute-on-rebase: if the tip is our own (now stale) bump — e.g. the
      # base moved after MR-A merged — peel it off so we re-derive the version
      # against the current base instead of stacking a stale bump that would
      # conflict on the next rebase/merge.
      if [ "$OURS" = "true" ]; then
        echo "Peeling prior auto-bump commit; recomputing against origin/${BRANCH}"
        git reset --hard HEAD~1
      fi

      if [ "$VERSION_FILE_TYPE" = "json" ]; then
        TMP=$(mktemp)
        jq --indent 2 ".$VERSION_JSON_KEY = \"$NEW_VERSION\"" "${VERSION_FILE}" > "$TMP"
        mv "$TMP" "${VERSION_FILE}"
      else
        echo "$NEW_VERSION" > "${VERSION_FILE}"
      fi

      # Changelog fragments (conflict-free): instead of prepending to the shared
      # CHANGELOG_FILE — which collides when two MRs land in one run — each MR
      # drops a uniquely-named fragment under CHANGELOG_DIR. Fragments are folded
      # into CHANGELOG_FILE at release time by /gitlab/assemble-changelog.yml.
      CHANGELOG_UPDATED=false
      if [ "$BUMP_CHANGELOG" = "true" ]; then
        mkdir -p "$CHANGELOG_DIR"
        TITLE="${CI_MERGE_REQUEST_TITLE:-}"
        # Parse renovate-style "<type>(deps): update dependency <name> to <version>"
        # into a cleaner "Bumped <name> to <version>"; otherwise use the title verbatim.
        ENTRY=$(printf '%s' "$TITLE" | sed -nE \
          's/^(fix|chore|feat)\(deps\): update dependency (.+) to (v?[^[:space:]]+)$/Bumped \2 to \3/p')
        if [ -z "$ENTRY" ]; then
          ENTRY="${TITLE:-Patch bump to $NEW_VERSION}"
        fi
        # Fragment name derives from the source branch: stable across rebases
        # (the same MR overwrites its own fragment) and disjoint between MRs
        # (no two MRs touch the same file → no merge conflict).
        SLUG=$(printf '%s' "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" | tr '/ ' '--' | tr -cd '[:alnum:]-' | cut -c1-60)
        FRAGMENT="$CHANGELOG_DIR/${SLUG:-mr-${CI_MERGE_REQUEST_IID:-0}}.md"
        printf '%s\n' "$ENTRY" > "$FRAGMENT"
        CHANGELOG_UPDATED=true
        echo "Wrote changelog fragment $FRAGMENT: $ENTRY"
      fi

      git config user.email "ci@gitlab"
      git config user.name "GitLab CI"
      if [ -n "$GITLAB_PUSH_TOKEN" ]; then
        git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "warning: GITLAB_PUSH_TOKEN not set — pushing with CI_JOB_TOKEN," >&2
        echo "  which does not trigger a follow-up pipeline. The MR will" >&2
        echo "  report ci_must_pass on the bump commit." >&2
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git add "${VERSION_FILE}"
      if [ "$CHANGELOG_UPDATED" = "true" ]; then
        git add "${CHANGELOG_DIR}"
      fi
      # The X-Auto-Bump trailer marks this as our own commit so a later run can
      # peel + recompute it (see the recompute-on-rebase block above).
      git commit -m "chore: bump patch version to $NEW_VERSION" -m "X-Auto-Bump: version"
      # force-with-lease: replace a peeled stale bump safely, while refusing to
      # clobber the branch if something else (e.g. a Renovate rebase) pushed first.
      git push --force-with-lease origin "HEAD:${SRC}"
