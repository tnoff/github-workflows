# Reusable GitLab CI template for scanning a Docker image tarball with TruffleHog.
#
# Companion to gitlab/trufflehog.yml: that one scans repo source, this one
# scans the assembled image so secrets baked into a layer (e.g. a leaky RUN
# command, a copied-then-deleted file) are caught even if they never appear
# in tracked source.
#
# This template scans a `docker save` tarball produced by an upstream build
# job. It does not build the image itself — wire it up with `needs:` to a
# job that publishes the tarball as an artifact. TruffleHog reads the OCI
# tarball directly, so no Docker daemon is required in this job.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/trufflehog-image.yml'
#
#   trufflehog-image:
#     extends: .trufflehog-image
#     needs:
#       - job: build-image
#         artifacts: true
#     variables:
#       TRUFFLEHOG_IMAGE_TARBALL: "image.tar"
#     rules:
#       - if: $CI_PIPELINE_SOURCE == "merge_request_event"
#       - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
#
# Required variables:
#   TRUFFLEHOG_IMAGE_TARBALL Path to a `docker save` tarball, typically fetched
#                            from an upstream build job's artifacts.
#
# Optional variables:
#   TRUFFLEHOG_VERSION       Pin a TruffleHog release (e.g. "3.83.7") to override
#                            the binary baked into CI_TRUFFLEHOG_IMAGE. Empty = use baked.
#   TRUFFLEHOG_EXTRA_ARGS    Extra flags passed to `trufflehog docker`
#                            (default: --only-verified --fail --concurrency=2).
#                            The concurrency cap keeps memory predictable on
#                            larger images; raise it if you need throughput
#                            and have headroom.
#   TRUFFLEHOG_EXCLUDE_PATHS Comma-separated glob patterns of image paths to
#                            skip (trufflehog `docker --exclude-paths`). Default
#                            excludes vendored Python deps
#                            (**/site-packages/**,**/dist-packages/**): they
#                            dominate the file/chunk count and secret-
#                            verification time but are third-party code, not
#                            ours. TRADE-OFF: dependency code is no longer
#                            scanned for embedded secrets — acceptable here
#                            because our own source is scanned by the companion
#                            `.trufflehog` (repo) job. Set to "" to scan
#                            everything. Globs use gobwas syntax with no path
#                            separator, so `*` matches across `/`.

.trufflehog-image:
  # Pre-baked ci-trufflehog image (alpine + pinned trufflehog binary); see the
  # CI_TRUFFLEHOG_IMAGE group var. Removes the per-scan `curl | sh` install
  # from raw.githubusercontent.com (a supply-chain dep that ran on every scan).
  image: $CI_TRUFFLEHOG_IMAGE
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: ""
    TRUFFLEHOG_VERSION: ""
    TRUFFLEHOG_EXTRA_ARGS: "--only-verified --fail --concurrency=2"
    TRUFFLEHOG_EXCLUDE_PATHS: "**/site-packages/**,**/dist-packages/**"
  before_script:
    # The image already ships trufflehog. Install only as a fallback (a
    # non-prebaked runner where the binary is absent) or when TRUFFLEHOG_VERSION
    # pins a specific release to override the baked one.
    - |
      if [ -n "$TRUFFLEHOG_VERSION" ]; then
        command -v curl >/dev/null 2>&1 || apk add --no-cache curl
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sh -s -- -b /usr/local/bin "v${TRUFFLEHOG_VERSION}"
      elif ! command -v trufflehog >/dev/null 2>&1; then
        command -v curl >/dev/null 2>&1 || apk add --no-cache curl
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sh -s -- -b /usr/local/bin
      fi
    - trufflehog --version
  script:
    - |
      if [ -z "$TRUFFLEHOG_IMAGE_TARBALL" ]; then
        echo "ERROR: TRUFFLEHOG_IMAGE_TARBALL must be set to the path of a docker save tarball." >&2
        echo "Provide it via an upstream build job's artifacts and link with 'needs:'." >&2
        exit 1
      fi
      echo "Scanning $TRUFFLEHOG_IMAGE_TARBALL"
      # --exclude-paths must be quoted: the glob contains `*`, which the shell
      # would otherwise pathname-expand against the job's working directory.
      # TRUFFLEHOG_EXTRA_ARGS stays unquoted so its flags word-split.
      if [ -n "$TRUFFLEHOG_EXCLUDE_PATHS" ]; then
        trufflehog docker --image "file://$TRUFFLEHOG_IMAGE_TARBALL" \
          --exclude-paths="$TRUFFLEHOG_EXCLUDE_PATHS" $TRUFFLEHOG_EXTRA_ARGS
      else
        trufflehog docker --image "file://$TRUFFLEHOG_IMAGE_TARBALL" $TRUFFLEHOG_EXTRA_ARGS
      fi
