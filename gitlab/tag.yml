# Reusable GitLab CI template for tagging a commit based on a version file.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/tag.yml'
#
#   tag-build:
#     extends: .tag
#     variables:
#       VERSION_FILE: './VERSION'           # optional, default shown
#       VERSION_FILE_TYPE: 'plain'          # optional: 'plain' or 'json'
#       VERSION_JSON_KEY: 'version'         # optional, used when VERSION_FILE_TYPE=json
#     rules:
#       # Gate fork MRs behind a manual step so CI only runs after a member approves
#       - if: $CI_PIPELINE_SOURCE == "merge_request_event" &&
#              $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
#         when: manual
#       - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
#         when: on_success
#
# Optional variables:
#   VERSION_FILE        Path to the version file (default: ./VERSION)
#   VERSION_FILE_TYPE   'plain' or 'json' (default: plain)
#   VERSION_JSON_KEY    Key holding the version when VERSION_FILE_TYPE=json (default: version)
#   GATE_ON_FRAGMENTS   Set to "true" on repos wired for /gitlab/assemble-changelog.yml.
#                       When changelog fragments are still pending under CHANGELOG_DIR,
#                       this job defers (TAG_CREATED=false) so assemble-changelog folds +
#                       pushes first; the fold push then fires a follow-up pipeline where
#                       CHANGELOG_DIR is empty and tag/release run against the assembled
#                       CHANGELOG. REQUIRES GITLAB_PUSH_TOKEN on the repo — under
#                       CI_JOB_TOKEN the fold push does not trigger the follow-up pipeline,
#                       so tag/release would never fire and no release is cut. (default: unset)
#   CHANGELOG_DIR       Directory of unassembled fragments (default: changelog.d). Only
#                       consulted when GATE_ON_FRAGMENTS=true.

.tag:
  # Pre-baked ci-alpine-utils image (git + curl + jq + bash); see CI_ALPINE_UTILS_IMAGE
  # group var. before_script install is a no-op fallback on the pre-baked image.
  image: $CI_ALPINE_UTILS_IMAGE
  variables:
    VERSION_FILE: './VERSION'
    VERSION_FILE_TYPE: 'plain'
    VERSION_JSON_KEY: 'version'
    GATE_ON_FRAGMENTS: ''
    CHANGELOG_DIR: 'changelog.d'
  before_script:
    - command -v git >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || apk add --no-cache git jq
  script:
    - |
      # Option-a gate for the changelog-fragment flow: if fragments are still
      # pending under CHANGELOG_DIR, this is the PRE-fold pipeline. Defer tagging
      # (TAG_CREATED=false, so .release skips too) and let assemble-changelog fold
      # + push first. That push (via GITLAB_PUSH_TOKEN — mandatory here) triggers a
      # follow-up pipeline where CHANGELOG_DIR is empty, this gate passes, and
      # tag/release run against the assembled CHANGELOG. Inert when unset, so repos
      # not using fragments are unaffected.
      if [ "$GATE_ON_FRAGMENTS" = "true" ] && ls "$CHANGELOG_DIR"/*.md >/dev/null 2>&1; then
        echo "Changelog fragments pending in $CHANGELOG_DIR — deferring tag to the post-assemble pipeline."
        echo "TAG_CREATED=false" >> build.env
        echo "TAG_EXISTS=false" >> build.env
        exit 0
      fi

      if [ "$VERSION_FILE_TYPE" = "json" ]; then
        VERSION="v$(jq -r ".$VERSION_JSON_KEY" "$VERSION_FILE")"
      else
        VERSION="v$(cat "$VERSION_FILE")"
      fi

      echo "VERSION=$VERSION" >> build.env

      # Configure remote to authenticate pushes via CI_JOB_TOKEN.
      # Requires "CI job token" push access enabled under Settings → CI/CD → Token Access.
      # Alternatively, set GITLAB_PUSH_TOKEN to a deploy/PAT token with write_repository scope
      # and the remote URL will use that instead.
      if [ -n "$GITLAB_PUSH_TOKEN" ]; then
        git remote set-url origin "https://deploy-token:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi

      if git ls-remote --tags origin "$VERSION" | grep -q .; then
        echo "TAG_CREATED=false" >> build.env
        echo "TAG_EXISTS=true" >> build.env
        echo "Tag $VERSION already exists - skipping"
      else
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "$VERSION"
        git push origin "$VERSION"
        echo "TAG_CREATED=true" >> build.env
        echo "TAG_EXISTS=false" >> build.env
        echo "Tag $VERSION created successfully"
      fi
  artifacts:
    reports:
      dotenv: build.env
