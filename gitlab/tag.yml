# Reusable GitLab CI template for tagging a commit based on a version file.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/tag.yml'
#
#   tag-build:
#     extends: .tag
#     variables:
#       VERSION_FILE: './VERSION'           # optional, default shown
#       VERSION_FILE_TYPE: 'plain'          # optional: 'plain' or 'json'
#       VERSION_JSON_KEY: 'version'         # optional, used when VERSION_FILE_TYPE=json
#     rules:
#       # Gate fork MRs behind a manual step so CI only runs after a member approves
#       - if: $CI_PIPELINE_SOURCE == "merge_request_event" &&
#              $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
#         when: manual
#       - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
#         when: on_success

.tag:
  variables:
    VERSION_FILE: './VERSION'
    VERSION_FILE_TYPE: 'plain'
    VERSION_JSON_KEY: 'version'
  script:
    - |
      if [ "$VERSION_FILE_TYPE" = "json" ]; then
        VERSION="v$(jq -r ".$VERSION_JSON_KEY" "$VERSION_FILE")"
      else
        VERSION="v$(cat "$VERSION_FILE")"
      fi

      echo "VERSION=$VERSION" >> build.env

      # Configure remote to authenticate pushes via CI_JOB_TOKEN.
      # Requires "CI job token" push access enabled under Settings → CI/CD → Token Access.
      # Alternatively, set GITLAB_PUSH_TOKEN to a deploy/PAT token with write_repository scope
      # and the remote URL will use that instead.
      if [ -n "$GITLAB_PUSH_TOKEN" ]; then
        git remote set-url origin "https://deploy-token:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi

      if git ls-remote --tags origin "$VERSION" | grep -q .; then
        echo "TAG_CREATED=false" >> build.env
        echo "TAG_EXISTS=true" >> build.env
        echo "Tag $VERSION already exists - skipping"
      else
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "$VERSION"
        git push origin "$VERSION"
        echo "TAG_CREATED=true" >> build.env
        echo "TAG_EXISTS=false" >> build.env
        echo "Tag $VERSION created successfully"
      fi
  artifacts:
    reports:
      dotenv: build.env
