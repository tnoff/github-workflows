# Reusable GitLab CI templates for running a Python tox test matrix plus
# a diff-cover coverage gate against the target branch.
#
# GitLab CI doesn't support taking a YAML list as a job-level variable, so
# the matrix is generated dynamically: `.tox-generate` introspects
# `tox -l` and writes a child pipeline YAML; `.tox-pipeline` triggers
# that child pipeline via `include: artifact:`.
#
# Consumer-side surface (the standard pair):
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/tox-pipeline.yml'
#
#   test:tox-generate:
#     extends: .tox-generate
#
#   test:tox:
#     extends: .tox-pipeline
#
# The `.tox-pipeline` job's `needs: [test:tox-generate]` and its
# `trigger.include.job` are baked into the template — the consumer's
# generate job MUST be named `test:tox-generate`.
#
# For Python tests with extra system dependencies (e.g. discord-bot needs
# `sqlite3 ffmpeg`), set TOX_EXTRA_APT on the generate job. `git` is
# always installed; the extras are appended.
#
#   test:tox-generate:
#     extends: .tox-generate
#     variables:
#       TOX_EXTRA_APT: 'sqlite3 ffmpeg'
#
# Alternatively, set TOX_BASE_IMAGE to a pre-baked image that already
# contains git + the system deps you'd otherwise install via apt, plus
# `tox` and `diff-cover`. The generated child pipeline then skips apt-get
# AND `pip install tox` for the tox jobs, and skips before_script
# entirely on the diff-cover job. Use ${PYTHON_VERSION} in the string
# to template per matrix entry (diff-cover substitutes it with the
# latest minor):
#
#   test:tox-generate:
#     extends: .tox-generate
#     variables:
#       TOX_BASE_IMAGE: '${CI_BASE_IMAGE_PATH}:${PYTHON_VERSION}'
#
# Similarly, set TOX_GENERATE_IMAGE to a pre-baked image that already
# contains `tox` to skip the parent `.tox-generate` job's own
# `pip install tox`. Unlike TOX_BASE_IMAGE, this is a single concrete
# tag (the parent runs once, not per matrix entry):
#
#   test:tox-generate:
#     extends: .tox-generate
#     variables:
#       TOX_GENERATE_IMAGE: '${CI_BASE_IMAGE_PATH}:3.14'
#
# When TOX_BASE_IMAGE is set, TOX_EXTRA_APT is ignored — the base image
# is the source of truth for system deps.
#
# When TOX_BASE_IMAGE is set AND the group CI variable TOX_CACHE_BUCKET is
# non-empty, the generated tox jobs also cache the `.tox/` venv to that OCI
# Object Storage bucket (S3), keyed on a hash of pyproject.toml + tox.ini per
# Python minor. On a hit tox skips the reinstall; the venv is saved only on a
# green tox run. Uses the reused buildkit-cache AWS_* creds already injected
# into job pods + the awscli/zstd baked into ci-base-images. No-op when
# TOX_CACHE_BUCKET is unset. See docs projects/ci-perf.md scope #9.
#
# Optional variables on `.tox-generate` (defaults shown):
#   TOX_EXTRA_APT             (empty)        Extra apt packages for the tox
#                                              child-pipeline job (appended
#                                              after the default `git`).
#                                              Ignored when TOX_BASE_IMAGE
#                                              is set.
#   TOX_BASE_IMAGE            (empty)        Pre-baked image reference for
#                                              the tox child-pipeline job.
#                                              When set, replaces the
#                                              docker.io/library/python:X.Y-slim
#                                              default and skips both
#                                              apt-get and `pip install tox`.
#                                              Use ${PYTHON_VERSION} to
#                                              template per matrix entry.
#   TOX_GENERATE_IMAGE        python:3.14-slim
#                                            Pre-baked image for the parent
#                                              `.tox-generate` job itself
#                                              (not the matrix child). When
#                                              the image already carries
#                                              `tox`, `pip install tox` is
#                                              skipped via a `command -v`
#                                              probe. Single concrete tag.
#   DIFF_COVER_FAIL_UNDER     100            Coverage threshold (percent).
#   DIFF_COVER_COMPARE_BRANCH origin/main    Branch to diff against.
#
# Both jobs default to `rules:` that run on MR pipelines, with fork-MRs
# requiring a maintainer to manually trigger. Override per consumer.

.tox-generate:
  stage: validate
  image: $TOX_GENERATE_IMAGE
  variables:
    TOX_EXTRA_APT: ''
    TOX_BASE_IMAGE: ''
    TOX_GENERATE_IMAGE: 'docker.io/library/python:3.14-slim'
    DIFF_COVER_FAIL_UNDER: '100'
    DIFF_COVER_COMPARE_BRANCH: 'origin/main'
  before_script:
    # Pre-baked TOX_GENERATE_IMAGE may already carry tox; the probe makes
    # this a no-op on the slim default and a ~10ms skip on the pre-bake.
    - command -v tox >/dev/null 2>&1 || pip install tox
  script:
    - |
      python3 - <<'PYEOF'
      import os, re, subprocess

      result = subprocess.run(['tox', '-l'], capture_output=True, text=True, check=True)
      versions = []
      for env in result.stdout.strip().splitlines():
          m = re.fullmatch(r'py(\d)(\d+)', env)
          if m:
              versions.append(f'{m.group(1)}.{m.group(2)}')

      if not versions:
          raise SystemExit(
              'No py<X><Y> envs found via `tox -l`; the .tox-generate template '
              'assumes a Python tox.ini with py3X-style envs.'
          )

      versions_yaml = '[' + ', '.join(f'"{v}"' for v in versions) + ']'
      # Pick the highest Python version as the canonical coverage producer
      # for diff-cover.
      latest = max(versions, key=lambda v: tuple(int(p) for p in v.split('.')))

      extra_apt = os.environ.get('TOX_EXTRA_APT', '').strip()
      base_image = os.environ.get('TOX_BASE_IMAGE', '').strip()
      fail_under = os.environ.get('DIFF_COVER_FAIL_UNDER', '100')
      compare_branch = os.environ.get('DIFF_COVER_COMPARE_BRANCH', 'origin/main')

      # .tox venv cache (scope #9). Emitted only in the TOX_BASE_IMAGE branch
      # (needs awscli + zstd from ci-base-images) and gated at runtime on the
      # TOX_CACHE_BUCKET group var, so it's a no-op until that var is set.
      # Reuses the buildkit-cache AWS_* creds already in every job pod. The
      # key hashes pyproject.toml + tox.ini per Python minor, so a dep bump
      # misses cleanly. Restore runs in before_script; save runs at the end
      # of script, so a red tox run never poisons the cache.
      # The tarball is staged to a FILE, then uploaded — NOT streamed from
      # stdin. A streamed `aws s3 cp - s3://…` forces chunked/streaming
      # payload signing, which OCI's S3-compat endpoint rejects with
      # SignatureDoesNotMatch on CreateMultipartUpload; a known-length file
      # signs per-part like buildkit's (working) multipart export does.
      # AWS_S3_ADDRESSING_STYLE=path is required for the underscore bucket
      # name; AWS_*_CHECKSUM_CALCULATION=when_required drops awscli v2's
      # default integrity checksums (the buildkit-v0.31 OCI remedy).
      # AWS_DEFAULT_REGION="$AWS_REGION" is the real fix: awscli (pip = v1,
      # botocore) resolves region from AWS_DEFAULT_REGION, but the secret
      # only sets AWS_REGION (which buildkit's Go SDK reads). Without this
      # awscli signs with a default region and OCI rejects the request with
      # SignatureDoesNotMatch / "the region must be specified".
      # Lines kept < 120 chars for this repo's yamllint (helper vars +
      # a shell line-continuation); the generated child YAML isn't linted.
      cache_restore = [
          '    - |',
          '      if [ -n "$TOX_CACHE_BUCKET" ]; then',
          '        export AWS_REQUEST_CHECKSUM_CALCULATION=when_required',
          '        export AWS_RESPONSE_CHECKSUM_CALCULATION=when_required',
          '        export AWS_S3_ADDRESSING_STYLE=path',
          '        export AWS_DEFAULT_REGION="$AWS_REGION"',
          '        TOX_CACHE_HASH=$(cat pyproject.toml tox.ini 2>/dev/null | sha256sum | cut -c1-16)',
          '        TOX_CACHE_KEY="tox-${CI_PROJECT_NAME}-${PYTHON_VERSION}-${TOX_CACHE_HASH}"',
          '        obj="s3://${TOX_CACHE_BUCKET}/${TOX_CACHE_KEY}.tar.zst"',
          '        if aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp "$obj" /tmp/tox-cache.tar.zst 2>/dev/null \\',
          '             && zstd -dq -c /tmp/tox-cache.tar.zst 2>/dev/null | tar -x 2>/dev/null; then',
          '          echo "tox cache: HIT ${TOX_CACHE_KEY}"',
          '        else',
          '          echo "tox cache: MISS ${TOX_CACHE_KEY}"; rm -rf .tox',
          '        fi',
          '        rm -f /tmp/tox-cache.tar.zst',
          '      fi',
      ]
      cache_save = [
          '    - |',
          '      if [ -n "$TOX_CACHE_BUCKET" ]; then',
          '        export AWS_REQUEST_CHECKSUM_CALCULATION=when_required',
          '        export AWS_RESPONSE_CHECKSUM_CALCULATION=when_required',
          '        export AWS_S3_ADDRESSING_STYLE=path',
          '        export AWS_DEFAULT_REGION="$AWS_REGION"',
          '        TOX_CACHE_HASH=$(cat pyproject.toml tox.ini 2>/dev/null | sha256sum | cut -c1-16)',
          '        TOX_CACHE_KEY="tox-${CI_PROJECT_NAME}-${PYTHON_VERSION}-${TOX_CACHE_HASH}"',
          '        obj="s3://${TOX_CACHE_BUCKET}/${TOX_CACHE_KEY}.tar.zst"',
          '        if tar -c .tox | zstd -q -o /tmp/tox-cache.tar.zst \\',
          '             && aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp /tmp/tox-cache.tar.zst "$obj"; then',
          '          echo "tox cache: saved ${TOX_CACHE_KEY}"',
          '        else',
          '          echo "tox cache: save failed (non-fatal)"',
          '        fi',
          '        rm -f /tmp/tox-cache.tar.zst',
          '      fi',
      ]

      tox_apt = ('git ' + extra_apt).strip()

      if base_image:
          tox_image_line = f'  image: {base_image}'
          # TOX_BASE_IMAGE is expected to carry tox + diff-cover + awscli +
          # zstd (see ci-base-images/python/Dockerfile). No apt/pip install
          # needed; before_script only restores the .tox/ venv cache (itself a
          # no-op unless the TOX_CACHE_BUCKET group var is set).
          tox_before_script = list(cache_restore)
          # diff-cover runs only on the coverage stage against `latest`, so
          # ${PYTHON_VERSION} substitution happens here (not via GitLab's
          # parallel-matrix expansion).
          diff_image_line = f'  image: {base_image.replace("${PYTHON_VERSION}", latest)}'
          diff_before_script = []
      else:
          tox_image_line = '  image: docker.io/library/python:${PYTHON_VERSION}-slim'
          tox_before_script = [
              f'    - apt-get update -qq && apt-get install -y -qq {tox_apt}',
              '    - pip install tox',
          ]
          diff_image_line = f'  image: docker.io/library/python:{latest}-slim'
          diff_before_script = [
              '    - apt-get update -qq && apt-get install -y -qq git',
              '    - pip install diff-cover',
          ]

      diff_cover_lines = [
          'diff-cover:',
          '  stage: coverage',
          diff_image_line,
          '  needs:',
          f'    - job: "tox: [{latest}]"',
          '      artifacts: true',
          '  variables:',
          '    GIT_DEPTH: "0"',
      ]
      if diff_before_script:
          diff_cover_lines += ['  before_script:', *diff_before_script]
      diff_cover_lines += [
          '  script:',
          f'    - diff-cover coverage.xml --compare-branch={compare_branch} --fail-under={fail_under}',
          '  rules:',
          '    - when: on_success',
      ]

      tox_lines = [
          'tox:',
          '  stage: test',
          tox_image_line,
          '  parallel:',
          '    matrix:',
          f'      - PYTHON_VERSION: {versions_yaml}',
      ]
      if tox_before_script:
          tox_lines += ['  before_script:', *tox_before_script]
      tox_script = [
          "    - tox -e $(python3 -c \"import sys; v=sys.version_info; print(f'py{v.major}{v.minor}')\")",
      ]
      # Save the venv only after a green tox run (script stops on tox failure),
      # so a broken/partial venv never gets cached.
      if base_image:
          tox_script += cache_save
      tox_lines += ['  script:', *tox_script]
      tox_lines += [
          '  artifacts:',
          '    paths:',
          '      - coverage.xml',
          '    expire_in: 1 day',
          '    when: always',
          '  rules:',
          '    - when: always',
      ]

      lines = [
          'stages:',
          '  - test',
          '  - coverage',
          '',
          # Child pipelines do NOT inherit the parent's `default:`, so the
          # parent repo's retry config never reaches these matrix jobs. Emit
          # it here so an infra-side pod-start failure (runner_system_failure /
          # timeout) auto-retries instead of needing a manual restart. Only
          # infra classes -> a failing test (script_failure) is never retried.
          'default:',
          '  retry:',
          '    max: 2',
          '    when:',
          '      - runner_system_failure',
          '      - stuck_or_timeout_failure',
          '      - scheduler_failure',
          '  tags:',
          '    - self-hosted',
          '',
          *tox_lines,
          '',
          *diff_cover_lines,
      ]
      with open('tox-pipeline.yml', 'w') as f:
          f.write('\n'.join(lines) + '\n')
      print('Generated tox-pipeline.yml:')
      print('\n'.join(lines))
      PYEOF
  artifacts:
    paths:
      - tox-pipeline.yml
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.tox-pipeline:
  stage: test
  needs: [test:tox-generate]
  trigger:
    include:
      - artifact: tox-pipeline.yml
        job: test:tox-generate
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
