# Reusable GitLab CI template that fires a cross-project pipeline trigger on
# a downstream repo (e.g. docker-apps) after this repo pushes a new image.
# The triggered pipeline runs a `bump-image-pin` job on the downstream repo
# that rewrites the image pin and opens an MR.
#
# This is the *producer* side — i.e. the repo that builds and pushes the
# image. The consumer side lives in the downstream repo as a per-source job
# (currently hidden as `.bump-image-pin-base` in docker-apps; a candidate to
# move into this workflows project as a separate template).
#
# The upstream `docker-push` job must emit `IMAGE=<full image ref>` to a
# dotenv artifact (`build.env`), and the trigger job must `needs:` that
# job with `artifacts: true` so $IMAGE is in scope here.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/trigger-bump.yml'
#
#   trigger-bump-docker-apps:
#     extends: .trigger-bump
#     needs:
#       - job: docker-push
#         artifacts: true
#     variables:
#       BUMP_SOURCE: 'my-repo-name'
#
# Override `stage:` if the consumer's pipeline doesn't have a `build` stage
# (e.g. oke-security-scanner uses `tag`). Override `rules:` if the trigger
# should fire under different conditions.
#
# Required variables (set per consumer job):
#   BUMP_SOURCE             Identifier for this producer repo. The downstream
#                           repo's bump-image-pin job gates on this value.
#
# Optional variables:
#   TARGET_PROJECT_ID       Numeric project ID of the downstream repo.
#                           Default: $DOCKER_APPS_PROJECT_ID (CI variable).
#   TARGET_TRIGGER_TOKEN    Pipeline trigger token on the downstream repo.
#                           Default: $DOCKER_APPS_TRIGGER_TOKEN (CI variable).
#   TARGET_REF              Branch/tag on the downstream repo to trigger
#                           against. Default: main.
#
# `allow_failure: true` by default — a downstream automation hiccup
# shouldn't fail the producer pipeline (the image is already pushed).

.trigger-bump:
  image: docker.io/library/alpine:3
  stage: build
  allow_failure: true
  variables:
    TARGET_PROJECT_ID: $DOCKER_APPS_PROJECT_ID
    TARGET_TRIGGER_TOKEN: $DOCKER_APPS_TRIGGER_TOKEN
    TARGET_REF: main
  before_script:
    - apk add --no-cache curl
  script:
    - |
      err() { echo "$1" >&2; exit 1; }
      [ -n "$BUMP_SOURCE" ]          || err "BUMP_SOURCE not set on this job"
      [ -n "$TARGET_PROJECT_ID" ]    || err "TARGET_PROJECT_ID not set (default: \$DOCKER_APPS_PROJECT_ID)"
      [ -n "$TARGET_TRIGGER_TOKEN" ] || err "TARGET_TRIGGER_TOKEN not set (default: \$DOCKER_APPS_TRIGGER_TOKEN)"
      [ -n "$IMAGE" ]                || err "IMAGE not set — upstream docker-push job must emit build.env"

      curl -sS --fail-with-body -X POST \
        --form "token=$TARGET_TRIGGER_TOKEN" \
        --form "ref=$TARGET_REF" \
        --form "variables[BUMP_SOURCE]=$BUMP_SOURCE" \
        --form "variables[IMAGE_NAME]=$IMAGE" \
        --form "variables[IMAGE_TAG]=$CI_COMMIT_SHORT_SHA" \
        "$CI_API_V4_URL/projects/$TARGET_PROJECT_ID/trigger/pipeline"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success
