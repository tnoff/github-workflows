# Reusable GitLab CI template for MR-time "does the Dockerfile compile"
# validation. Builds a local image with buildkit and emits a docker-save
# tarball that downstream MR jobs (e.g. .trufflehog-image from 0.0.36) can
# scan without rebuilding.
#
# No push. No registry credentials. Starts an EPHEMERAL in-job buildkitd
# (the cluster-side buildkitd Deployment was retired so the ci pool can scale
# to zero — see the docs project ci-scale-to-zero). Same buildctl transport as
# .buildkit-docker-push. No dind, but it DOES need a privileged runner — the
# OKE default runner runs job pods privileged.
#
# Usage in consumer repo's .gitlab-ci.yml:
#
#   include:
#     - project: 'org/ci-workflows'
#       ref: main
#       file: '/gitlab/buildkit-build-check.yml'
#
#   build-check:
#     extends: .buildkit-build-check
#
#   trufflehog-image:
#     extends: .trufflehog-image
#     stage: validate
#     needs: [build-check]
#     variables:
#       TRUFFLEHOG_IMAGE_TARBALL: image.tar
#
# For repos that build multiple images (e.g. discord-bot's bot + dispatcher),
# define one job per Dockerfile and override per-variant inputs:
#
#   build-check-dispatcher:
#     extends: .buildkit-build-check
#     variables:
#       DOCKERFILE_NAME: Dockerfile.dispatcher
#       OUTPUT_NAME: discord-dispatcher:ci
#       OUTPUT_TARBALL: image-dispatcher.tar
#
# Optional variables (defaults shown):
#   BUILDKIT_IMAGE      docker.io/moby/buildkit:v0.30.0
#   BUILDKIT_ADDR       unix:///run/buildkit/buildkitd.sock  (in-job daemon;
#                                       override only to target an external one)
#   CONTEXT_DIR         .              buildctl --local context=
#   DOCKERFILE_DIR      .              buildctl --local dockerfile=
#   DOCKERFILE_NAME     Dockerfile     buildctl --opt filename=
#   BUILD_ARGS          (empty)        Extra buildctl flags, space-separated.
#                                       Example: '--opt build-arg:DB_TYPE=sqlite'
#   OUTPUT_NAME         $CI_PROJECT_NAME:ci  Local image tag
#   OUTPUT_TARBALL      image.tar      docker-save tarball path; published as
#                                       an artifact with 1-day expiry
#   CACHE_NAME          $CI_PROJECT_NAME-$DOCKERFILE_NAME  S3 cache key.
#                                       One cache namespace per (repo, Dockerfile)
#                                       so multi-image repos (bot + dispatcher)
#                                       don't stomp each other.
#
# S3 cache is opt-in by env: when BUILDKIT_CACHE_BUCKET is set (the OKE
# runner injects it from the `buildkit-s3-creds` secret), every build
# imports + exports OCI cache manifests to OCI Object Storage S3-compat
# so subsequent builds reuse layers across pod / buildkitd restarts.
# When the env var is unset (consumer running on a different runner),
# the build runs cold and the cache flags are skipped.
#
# Default rules: runs on every MR; fork-MRs require a maintainer to click
# `manual` (prevents untrusted code from running CI automatically).
# Override `stage:` / `rules:` per consumer as needed.

.buildkit-build-check:
  stage: validate
  image: $BUILDKIT_IMAGE
  variables:
    BUILDKIT_IMAGE: docker.io/moby/buildkit:v0.30.0
    BUILDKIT_ADDR: unix:///run/buildkit/buildkitd.sock
    CONTEXT_DIR: .
    DOCKERFILE_DIR: .
    DOCKERFILE_NAME: Dockerfile
    BUILD_ARGS: ''
    OUTPUT_NAME: $CI_PROJECT_NAME:ci
    OUTPUT_TARBALL: image.tar
    CACHE_NAME: $CI_PROJECT_NAME-$DOCKERFILE_NAME
  before_script:
    - |
      # Ephemeral in-job buildkitd — the cluster buildkitd Deployment was
      # retired so the ci pool can scale to zero (docs: ci-scale-to-zero).
      # The moby/buildkit image ships buildkitd + buildctl; the OKE default
      # runner runs job pods privileged, so a rootful buildkitd on a local
      # unix socket works without dind. S3 layer cache is unaffected: the
      # AWS_* / BUILDKIT_CACHE_BUCKET vars (buildkit-s3-creds) are in this
      # container's env, so the in-job daemon imports/exports the same OCI
      # Object Storage cache the cluster daemon used to.
      buildkitd >/tmp/buildkitd.log 2>&1 &
      for i in $(seq 1 30); do
        buildctl --addr "$BUILDKIT_ADDR" debug workers >/dev/null 2>&1 && break
        if [ "$i" = 30 ]; then
          echo "buildkitd did not become ready:" >&2; cat /tmp/buildkitd.log >&2; exit 1
        fi
        sleep 1
      done
  script:
    - |
      CACHE_ARGS=""
      if [ -n "${BUILDKIT_CACHE_BUCKET:-}" ]; then
        S3_COMMON="type=s3,region=${AWS_REGION},endpoint_url=${AWS_ENDPOINT_URL_S3},bucket=${BUILDKIT_CACHE_BUCKET},name=${CACHE_NAME}"
        CACHE_ARGS="--import-cache ${S3_COMMON} --export-cache ${S3_COMMON},mode=max"
        echo "buildkit S3 cache enabled: name=${CACHE_NAME} bucket=${BUILDKIT_CACHE_BUCKET}"
      else
        echo "BUILDKIT_CACHE_BUCKET not set — building without remote cache"
      fi
    - |
      buildctl --addr "$BUILDKIT_ADDR" build \
        --frontend dockerfile.v0 \
        --local context="$CONTEXT_DIR" --local dockerfile="$DOCKERFILE_DIR" \
        --opt filename="$DOCKERFILE_NAME" \
        $BUILD_ARGS \
        $CACHE_ARGS \
        --output type=docker,name="$OUTPUT_NAME",dest="$OUTPUT_TARBALL"
  artifacts:
    paths:
      - $OUTPUT_TARBALL
    expire_in: 1 day
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
